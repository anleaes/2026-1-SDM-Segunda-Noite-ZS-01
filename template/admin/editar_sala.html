{% extends 'base.html' %}
{% block title %}Editar Sala{% endblock title %}

{% block body %}
<div class="form-page">
  <div class="form-card">
    <h1>Editar Sala</h1>
    <form method="POST">
      {% csrf_token %}
      <div class="row-group">
        <div class="field-group">
          <label>Identificação / Número</label>
          <input type="text" name="numero" value="{{ sala.numero }}" required />
        </div>
        <div class="field-group">
          <label>Capacidade (Assentos)</label>
          <input type="number" name="capacidade" value="{{ sala.capacidade }}" min="1" required />
        </div>
      </div>
      <div class="field-group checkbox-group">
        <label class="switch">
          <input type="checkbox" name="sala3D" {% if sala.sala3D %}checked{% endif %}>
          <span class="slider"></span>
        </label>
        <span class="checkbox-label">Esta sala suporta exibição em 3D</span>
      </div>
      <div class="btn-row">
        <a href="{% url 'administrador:listar_salas' %}" class="btn-secondary">Cancelar</a>
        <button type="submit" class="btn-submit">Salvar Alterações</button>
      </div>
    </form>
  </div>
</div>

<style>
  body {
    background-color: #0f0f0f;
    font-family: Arial, Helvetica, sans-serif;
    color: white;
  }
  .form-page {
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 50px 20px;
    min-height: 100vh;
  }
  .form-card {
    background-color: #1a1a1a;
    width: 100%;
    max-width: 650px;
    padding: 45px;
    border-radius: 16px;
    border: 1px solid #2a2a2a;
    box-shadow: 0 0 25px rgba(255, 0, 0, 0.15);
  }
  .form-card h1 {
    text-align: center;
    color: #ff2d2d;
    margin-bottom: 35px;
    font-size: 2.2rem;
    letter-spacing: 1px;
  }
  form {
    display: flex;
    flex-direction: column;
    gap: 24px;
  }
  .row-group {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }
  .field-group {
    display: flex;
    flex-direction: column;
  }
  .field-group label {
    margin-bottom: 8px;
    font-weight: bold;
    color: #fff;
    font-size: 0.95rem;
  }
  .field-group input[type="text"],
  .field-group input[type="number"] {
    background-color: #111;
    border: 1px solid #333;
    border-radius: 10px;
    padding: 14px;
    color: white;
    font-size: 1rem;
    transition: 0.2s ease;
    font-family: inherit;
    color-scheme: dark;
  }
  .field-group input[type="text"]:focus,
  .field-group input[type="number"]:focus {
    outline: none;
    border-color: #ff2d2d;
    box-shadow: 0 0 10px rgba(255, 0, 0, 0.3);
  }
  .field-group input[type="number"]::-webkit-inner-spin-button,
  .field-group input[type="number"]::-webkit-outer-spin-button {
    -webkit-appearance: none;
    opacity: 1;
    width: 24px;
    background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23ff2d2d' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpath d='M7 10L12 5L17 10M7 14L12 19L17 14'/%3e%3c/svg%3e");
    background-repeat: no-repeat;
    background-position: center;
    background-size: 16px;
    cursor: pointer;
  }
  @media (max-width: 600px) {
    .row-group {
      grid-template-columns: 1fr;
    }
  }
</style>
{% endblock body %}
