{% extends 'base.html' %}
{% block title %}Editar Sala{% endblock title %}

{% block body %}
<div class="form-page">
  <div class="form-card">
    <h1>Editar Sala</h1>
    <form method="POST">
      {% csrf_token %}
      <div class="row-group">
        <div class="field-group">
          <label>Identificação / Número</label>
          <input type="text" name="numero" value="{{ sala.numero }}" required />
        </div>
        <div class="field-group">
          <label>Capacidade (Assentos)</label>
          <input type="number" name="capacidade" value="{{ sala.capacidade }}" min="1" required />
        </div>
      </div>
      <div class="field-group checkbox-group">
        <label class="switch">
          <input type="checkbox" name="sala3D" {% if sala.sala3D %}checked{% endif %}>
          <span class="slider"></span>
        </label>
        <span class="checkbox-label">Esta sala suporta exibição em 3D</span>
      </div>
      <div class="btn-row">
        <a href="{% url 'administrador:listar_salas' %}" class="btn-secondary">Cancelar</a>
        <button type="submit" class="btn-submit">Salvar Alterações</button>
      </div>
    </form>
  </div>
</div>

<style>
  body {
    background-color: #0f0f0f;
    font-family: Arial, Helvetica, sans-serif;
    color: white;
  }
  .form-page {
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 50px 20px;
    min-height: 100vh;
  }
  .form-card {
    background-color: #1a1a1a;
    width: 100%;
    max-width: 650px;
    padding: 45px;
    border-radius: 16px;
    border: 1px solid #2a2a2a;
    box-shadow: 0 0 25px rgba(255, 0, 0, 0.15);
  }
  .form-card h1 {
    text-align: center;
    color: #ff2d2d;
    margin-bottom: 35px;
    font-size: 2.2rem;
    letter-spacing: 1px;
  }
  form {
    display: flex;
    flex-direction: column;
    gap: 24px;
  }
  .row-group {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }
  @media (max-width: 600px) {
    .row-group {
      grid-template-columns: 1fr;
    }
  }
</style>
{% endblock body %}
