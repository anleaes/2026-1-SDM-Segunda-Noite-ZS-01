{% extends 'base.html' %}
{% block title %}Editar Sala{% endblock title %}

{% block body %}
<div class="form-page">
  <div class="form-card">
    <h1>Editar Sala</h1>
    <form method="POST">
      {% csrf_token %}
      <div class="row-group">
        <div class="field-group">
          <label>Identificação / Número</label>
          <input type="text" name="numero" value="{{ sala.numero }}" required />
        </div>
        <div class="field-group">
          <label>Capacidade (Assentos)</label>
          <input type="number" name="capacidade" value="{{ sala.capacidade }}" min="1" required />
        </div>
      </div>
      <div class="field-group checkbox-group">
        <label class="switch">
          <input type="checkbox" name="sala3D" {% if sala.sala3D %}checked{% endif %}>
          <span class="slider"></span>
        </label>
        <span class="checkbox-label">Esta sala suporta exibição em 3D</span>
      </div>
      <div class="btn-row">
        <a href="{% url 'administrador:listar_salas' %}" class="btn-secondary">Cancelar</a>
        <button type="submit" class="btn-submit">Salvar Alterações</button>
      </div>
    </form>
  </div>
</div>
{% endblock body %}
