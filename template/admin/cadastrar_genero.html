{% extends 'base.html' %}
{% block title %}Cadastrar Gênero{% endblock title %}

{% block body %}
<div class="form-page">
  <div class="form-card">
    <h1>Cadastrar Gênero</h1>
    <form method="POST">
      {% csrf_token %}
      <div class="field-group">
        <label>Nome</label>
        <input type="text" name="nome" placeholder="Ex: Ação, Comédia..." required />
      </div>
      <div class="field-group">
        <label>Descrição</label>
        <textarea name="descricao" rows="4" placeholder="Breve descrição sobre o gênero..."></textarea>
      </div>
      <div class="field-group">
        <label>Ícone</label>
        <input type="text" name="icone" placeholder="Ex: fa-solid fa-film, emoji ou texto" />
      </div>
    </form>
  </div>
</div>
{% endblock body %}
