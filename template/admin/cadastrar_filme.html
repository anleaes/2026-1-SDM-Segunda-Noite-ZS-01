{% extends 'base.html' %}
{% block title %}Cadastrar Filme{% endblock %}

{% block body %}
<div class="form-page">
  <div class="form-card">
    <h1>Cadastro de Filme</h1>

    <form method="POST" enctype="multipart/form-data">
      {% csrf_token %}

      <div class="field-group">
        <label>Título</label>
        <input 
          type="text" 
          name="titulo" 
          placeholder="Nome do filme" 
          required
        >
      </div>

      <div class="row-group">
        <div class="field-group">
          <label>Duração (min)</label>
          <input 
            type="number" 
            name="duracao" 
            placeholder="120" 
            min="1" 
            required
          >
        </div>

        <div class="field-group">
          <label>Classificação</label>
          <select name="classificacao" required>
            <option value="" disabled selected>Selecione</option>
            <option value="Livre">Livre</option>
            <option value="10">10 anos</option>
            <option value="12">12 anos</option>
            <option value="14">14 anos</option>
            <option value="16">16 anos</option>
            <option value="18">18 anos</option>
          </select>
        </div>
      </div>

      <div class="field-group">
        <label>Gênero</label>

        <select name="genero" required>
          <option value="" disabled selected>
            Selecione o gênero
          </option>

          {% for g in generos %}
            <option value="{{ g.pk }}">
              {{ g.nome }}
            </option>
          {% endfor %}
        </select>
      </div>

      <div class="field-group">
        <label>Cartaz</label>

        <input 
          type="file" 
          name="cartaz" 
          accept="image/*"
        >

        <small>
          Formatos aceitos: JPG, PNG e WebP
        </small>
      </div>

      <div class="btn-row">
        <a 
          href="{% url 'administrador:listar_filmes' %}" 
          class="btn-secondary"
        >
          Cancelar
        </a>

        <button type="submit" class="btn-submit">
          Cadastrar Filme
        </button>
      </div>
    </form>
  </div>
</div>

<style>
  body {
    background-color: #0f0f0f;
    font-family: Arial, Helvetica, sans-serif;
    color: white;
  }

  .form-page {
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 50px 20px;
    min-height: 100vh;
  }

  .form-card {
    background-color: #1a1a1a;
    width: 100%;
    max-width: 750px;
    padding: 45px;
    border-radius: 16px;
    border: 1px solid #2a2a2a;
    box-shadow: 0 0 25px rgba(255, 0, 0, 0.15);
  }

  .form-card h1 {
    text-align: center;
    color: #ff2d2d;
    margin-bottom: 35px;
    font-size: 2.2rem;
    letter-spacing: 1px;
  }

  form {
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .field-group {
    display: flex;
    flex-direction: column;
  }

  .field-group label {
    margin-bottom: 8px;
    font-weight: bold;
    color: #fff;
    font-size: 0.95rem;
  }

  .field-group small {
    margin-top: 6px;
    color: #888;
    font-size: 0.82rem;
  }

  .field-group input,
  .field-group select {
    background-color: #111;
    border: 1px solid #333;
    border-radius: 10px;
    padding: 14px;
    color: white;
    font-size: 1rem;
    transition: 0.2s ease;
    font-family: inherit;
  }

  .field-group input[type="file"] {
    padding: 10px 14px;
    cursor: pointer;
  }

  .field-group input:focus,
  .field-group select:focus {
    outline: none;
    border-color: #ff2d2d;
    box-shadow: 0 0 10px rgba(255, 0, 0, 0.3);
  }

  .field-group input::placeholder {
    color: #888;
  }

  .field-group select option {
    background: #1a1a1a;
  }

  .row-group {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }

  .btn-row {
    display: flex;
    gap: 14px;
    margin-top: 10px;
  }

  .btn-submit {
    flex: 1;
    background: linear-gradient(135deg, #c40000, #7a0000);
    color: white;
    border: none;
    padding: 15px;
    border-radius: 10px;
    font-size: 1rem;
    font-weight: bold;
    cursor: pointer;
    transition: 0.2s ease;
  }

  .btn-submit:hover {
    background: linear-gradient(135deg, #ff1a1a, #990000);
    box-shadow: 0 0 15px rgba(255, 0, 0, 0.4);
    transform: translateY(-2px);
  }

  .btn-secondary {
    flex: 1;
    background: #2a2a2a;
    color: #ccc;
    border: 1px solid #444;
    padding: 15px;
    border-radius: 10px;
    font-size: 1rem;
    font-weight: bold;
    text-decoration: none;
    text-align: center;
    transition: 0.2s ease;
  }

  .btn-secondary:hover {
    background: #333;
    color: white;
  }

  @media (max-width: 600px) {
    .row-group {
      grid-template-columns: 1fr;
    }

    .form-card {
      padding: 28px 20px;
    }
  }
</style>
{% endblock %}
