{% extends 'base.html' %}
{% block title %}Gêneros{% endblock title %}

{% block body %}
<div class="list-page">
  <div class="list-header">
    <h1>Gêneros</h1>
    <a href="{% url 'administrador:cadastrar_genero' %}" class="btn-novo">+ Novo Gênero</a>
  </div>

  {% if messages %}
    {% for msg in messages %}<div class="alert">{{ msg }}</div>{% endfor %}
  {% endif %}

  <div class="table-wrapper">
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Nome</th>
          <th>Descrição</th>
          <th>Ícone</th>
          <th>Ações</th>
        </tr>
      </thead>
      <tbody>
      </tbody>
    </table>
  </div>
</div>
{% endblock body %}
