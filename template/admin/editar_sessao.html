{% extends 'base.html' %}
{% block title %}Editar Sessão{% endblock title %}

{% block body %}
<div class="form-page">
  <div class="form-card">
    <h1>Editar Sessão</h1>
    <form method="POST">
      {% csrf_token %}
      <div class="field-group">
        <label>Filme</label>
        <select name="filme" required>
          <option value="" disabled>Selecione o filme</option>
          {% for f in filmes %}
            <option value="{{ f.pk }}" {% if f.pk == sessao.filme.pk %}selected{% endif %}>
              {{ f.titulo }}
            </option>
          {% endfor %}
        </select>
      </div>
      <div class="row-group">
        <div class="field-group">
          <label>Sala</label>
          <select name="sala" required>
            <option value="" disabled>Selecione a sala</option>
            {% for s in salas %}
              <option value="{{ s.pk }}" {% if s.pk == sessao.sala.pk %}selected{% endif %}>
                {{ s.nome }}
              </option>
            {% endfor %}
          </select>
        </div>
        <div class="field-group">
          <label>Horário</label>
          <input
            type="datetime-local"
            name="horario"
            value="{{ sessao.horario|date:'Y-m-d\TH:i' }}"
            required
          />
        </div>
      </div>
    </form>
  </div>
</div>
{% endblock body %}
