{% extends 'base.html' %}
{% block title %}Editar Sessão{% endblock title %}

{% block body %}
<div class="form-page">
  <div class="form-card">
    <h1>Editar Sessão</h1>
    <form method="POST">
      {% csrf_token %}
      <div class="field-group">
        <label>Filme</label>
        <select name="filme" required>
          <option value="" disabled>Selecione o filme</option>
          {% for f in filmes %}
            <option value="{{ f.pk }}" {% if f.pk == sessao.filme.pk %}selected{% endif %}>
              {{ f.titulo }}
            </option>
          {% endfor %}
        </select>
      </div>
      <div class="row-group">
        <div class="field-group">
          <label>Sala</label>
          <select name="sala" required>
            <option value="" disabled>Selecione a sala</option>
            {% for s in salas %}
              <option value="{{ s.pk }}" {% if s.pk == sessao.sala.pk %}selected{% endif %}>
                {{ s.nome }}
              </option>
            {% endfor %}
          </select>
        </div>
        <div class="field-group">
          <label>Horário</label>
          <input
            type="datetime-local"
            name="horario"
            value="{{ sessao.horario|date:'Y-m-d\TH:i' }}"
            required
          />
        </div>
      </div>
      <div class="btn-row">
        <a href="{% url 'administrador:listar_sessoes' %}" class="btn-secondary">
          Cancelar
        </a>
        <button type="submit" class="btn-submit">Salvar Alterações</button>
      </div>
    </form>
  </div>
</div>

<style>
  body {
    background-color: #0f0f0f;
    font-family: Arial, Helvetica, sans-serif;
    color: white;
  }
  .form-page {
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 50px 20px;
    min-height: 100vh;
  }
  .form-card {
    background-color: #1a1a1a;
    width: 100%;
    max-width: 750px;
    padding: 45px;
    border-radius: 16px;
    border: 1px solid #2a2a2a;
    box-shadow: 0 0 25px rgba(255, 0, 0, 0.15);
  }
  .form-card h1 {
    text-align: center;
    color: #ff2d2d;
    margin-bottom: 35px;
    font-size: 2.2rem;
    letter-spacing: 1px;
  }
  form {
    display: flex;
    flex-direction: column;
    gap: 20px;
  }
  .field-group {
    display: flex;
    flex-direction: column;
  }
  .field-group label {
    margin-bottom: 8px;
    font-weight: bold;
    color: #fff;
    font-size: 0.95rem;
  }
  .field-group input,
  .field-group select {
    background-color: #111;
    border: 1px solid #333;
    border-radius: 10px;
    padding: 14px;
    color: white;
    font-size: 1rem;
    transition: 0.2s ease;
    font-family: inherit;
    color-scheme: dark;
  }
  .field-group select {
    -webkit-appearance: none;
    -moz-appearance: none;
    appearance: none;
    background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23ff2d2d' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
    background-repeat: no-repeat;
    background-position: right 14px center;
    background-size: 18px;
    padding-right: 40px;
    cursor: pointer;
  }
  .field-group input:focus,
  .field-group select:focus {
    outline: none;
    border-color: #ff2d2d;
    box-shadow: 0 0 10px rgba(255, 0, 0, 0.3);
  }
</style>
{% endblock body %}
