{% extends 'base.html' %}
{% block title %}Salas{% endblock title %}

{% block body %}
<div class="list-page">
  <div class="list-header">
    <h1>Salas</h1>
    <a href="{% url 'administrador:cadastrar_sala' %}" class="btn-novo">+ Nova Sala</a>
  </div>

  {% if messages %}
    {% for msg in messages %}<div class="alert">{{ msg }}</div>{% endfor %}
  {% endif %}

  <div class="table-wrapper">
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Identificação</th>
          <th>Capacidade</th>
          <th>3D</th>
          <th>Ações</th>
        </tr>
      </thead>
      <tbody>
      </tbody>
    </table>
  </div>
</div>
{% endblock body %}
