{% extends 'base.html' %}
{% block title %}Sessões{% endblock title %}

{% block body %}
<div class="list-page">
  <div class="list-header">
    <h1>Sessões</h1>
    <a href="{% url 'administrador:cadastrar_sessao' %}" class="btn-novo">+ Nova Sessão</a>
  </div>

  {% if messages %}
    {% for msg in messages %}<div class="alert">{{ msg }}</div>{% endfor %}
  {% endif %}

  <div class="table-wrapper">
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Filme</th>
          <th>Sala</th>
          <th>Horário</th>
          <th>Status</th>
          <th>Ações</th>
        </tr>
      </thead>
      <tbody>
        </tbody>
    </table>
  </div>
</div>
{% endblock body %}
