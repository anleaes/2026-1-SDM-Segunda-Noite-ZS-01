{% extends 'base.html' %}
{% block title %}Editar Gênero{% endblock title %}

{% block body %}
<div class="form-page">
  <div class="form-card">
    <h1>Editar Gênero</h1>
    <form method="POST">
      {% csrf_token %}
      <div class="field-group">
        <label>Nome</label>
        <input type="text" name="nome" value="{{ genero.nome }}" required />
      </div>
      <div class="field-group">
        <label>Descrição</label>
        <textarea name="descricao" rows="4">{{ genero.descricao }}</textarea>
      </div>
      <div class="field-group">
        <label>Ícone</label>
        <input type="text" name="icone" value="{{ genero.icone }}" />
      </div>
      <div class="btn-row">
        <a href="{% url 'administrador:listar_generos' %}" class="btn-secondary">Cancelar</a>
        <button type="submit" class="btn-submit">Salvar Alterações</button>
      </div>
    </form>
  </div>
</div>

<style>
  body {
    background-color: #0f0f0f;
    font-family: Arial, Helvetica, sans-serif;
    color: white;
  }
  .form-page {
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 50px 20px;
    min-height: 100vh;
  }
  .form-card {
    background-color: #1a1a1a;
    width: 100%;
    max-width: 650px;
    padding: 45px;
    border-radius: 16px;
    border: 1px solid #2a2a2a;
    box-shadow: 0 0 25px rgba(255, 0, 0, 0.15);
  }
  .form-card h1 {
    text-align: center;
    color: #ff2d2d;
    margin-bottom: 35px;
    font-size: 2.2rem;
    letter-spacing: 1px;
  }
  form {
    display: flex;
    flex-direction: column;
    gap: 20px;
  }
</style>
{% endblock body %}
