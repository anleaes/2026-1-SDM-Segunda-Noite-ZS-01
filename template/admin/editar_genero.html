{% extends 'base.html' %}
{% block title %}Editar Gênero{% endblock title %}

{% block body %}
<div class="form-page">
  <div class="form-card">
    <h1>Editar Gênero</h1>
    <form method="POST">
      {% csrf_token %}
      <div class="field-group">
        <label>Nome</label>
        <input type="text" name="nome" value="{{ genero.nome }}" required />
      </div>
    </form>
  </div>
</div>
{% endblock body %}
