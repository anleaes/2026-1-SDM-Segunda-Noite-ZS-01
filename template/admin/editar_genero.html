{% extends 'base.html' %}
{% block title %}Editar Gênero{% endblock title %}

{% block body %}
<div class="form-page">
  <div class="form-card">
    <h1>Editar Gênero</h1>
    <form method="POST">
      {% csrf_token %}
      <div class="field-group">
        <label>Nome</label>
        <input type="text" name="nome" value="{{ genero.nome }}" required />
      </div>
      <div class="field-group">
        <label>Descrição</label>
        <textarea name="descricao" rows="4">{{ genero.descricao }}</textarea>
      </div>
      <div class="field-group">
        <label>Ícone</label>
        <input type="text" name="icone" value="{{ genero.icone }}" />
      </div>
      <div class="btn-row">
        <a href="{% url 'administrador:listar_generos' %}" class="btn-secondary">Cancelar</a>
        <button type="submit" class="btn-submit">Salvar Alterações</button>
      </div>
    </form>
  </div>
</div>

<style>
  body {
    background-color: #0f0f0f;
    font-family: Arial, Helvetica, sans-serif;
    color: white;
  }
  .form-page {
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 50px 20px;
    min-height: 100vh;
  }
  .form-card {
    background-color: #1a1a1a;
    width: 100%;
    max-width: 650px;
    padding: 45px;
    border-radius: 16px;
    border: 1px solid #2a2a2a;
    box-shadow: 0 0 25px rgba(255, 0, 0, 0.15);
  }
  .form-card h1 {
    text-align: center;
    color: #ff2d2d;
    margin-bottom: 35px;
    font-size: 2.2rem;
    letter-spacing: 1px;
  }
  form {
    display: flex;
    flex-direction: column;
    gap: 20px;
  }
  .field-group {
    display: flex;
    flex-direction: column;
  }
  .field-group label {
    margin-bottom: 8px;
    font-weight: bold;
    color: #fff;
    font-size: 0.95rem;
  }
  .field-group input,
  .field-group textarea {
    background-color: #111;
    border: 1px solid #333;
    border-radius: 10px;
    padding: 14px;
    color: white;
    font-size: 1rem;
    transition: 0.2s ease;
    font-family: inherit;
    color-scheme: dark;
    resize: vertical;
  }
  .field-group input:focus,
  .field-group textarea:focus {
    outline: none;
    border-color: #ff2d2d;
    box-shadow: 0 0 10px rgba(255, 0, 0, 0.3);
  }
  .btn-row {
    display: flex;
    gap: 14px;
    margin-top: 10px;
  }
  .btn-submit {
    flex: 1;
    background: linear-gradient(135deg, #c40000, #7a0000);
    color: white;
    border: none;
    padding: 15px;
    border-radius: 10px;
    font-size: 1rem;
    font-weight: bold;
    cursor: pointer;
    transition: 0.2s ease;
  }
  .btn-submit:hover {
    background: linear-gradient(135deg, #ff1a1a, #990000);
    box-shadow: 0 0 15px rgba(255, 0, 0, 0.4);
    transform: translateY(-2px);
  }
  .btn-secondary {
    flex: 1;
    background: #2a2a2a;
    color: #ccc;
    border: 1px solid #444;
    padding: 15px;
    border-radius: 10px;
    font-size: 1rem;
    font-weight: bold;
    text-decoration: none;
    text-align: center;
    transition: 0.2s ease;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .btn-secondary:hover {
    background: #333;
    color: white;
  }
  @media (max-width: 600px) {
    .form-card {
      padding: 28px 20px;
    }
    .btn-row {
      flex-direction: column;
    }
  }
</style>
{% endblock body %}
