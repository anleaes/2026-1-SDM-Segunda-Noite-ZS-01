{% extends 'base.html' %}

{% block title %}Login{% endblock title %}

{% block body %}
<div class="form-page">
    <div class="form-card">
        <h1>Entrar</h1>
        {% if erro %}
            <div style="color: #b91c1c; text-align: center; margin-bottom: 14px;">{{ erro }}</div>
        {% endif %}
        <form method="POST">
            {% csrf_token %}
            <input type="email" name="email" placeholder="Email" required>
            <input type="password" name="senha" placeholder="Senha" required>
            <button type="submit">Entrar</button>
        </form>
    </div>
</div>
<style>
    body {
        background-color: #0f0f0f;
        font-family: Arial, Helvetica, sans-serif;
        color: white;
    }

    .form-page {
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 50px 20px;
    }

    .form-card {
        background-color: #1a1a1a;
        width: 100%;
        max-width: 420px;
        padding: 40px;
        border-radius: 16px;
        border: 1px solid #2a2a2a;
        box-shadow: 0 0 25px rgba(255, 0, 0, 0.15);
    }

    .form-card h1 {
        text-align: center;
        color: #ff2d2d;
        margin-bottom: 28px;
        font-size: 2rem;
        letter-spacing: 1px;
    }

    form {
        display: flex;
        flex-direction: column;
        gap: 18px;
    }

    .field-group {
        display: flex;
        flex-direction: column;
    }

    .field-group label {
        margin-bottom: 8px;
        font-weight: bold;
        color: #fff;
        font-size: 0.95rem;
    }

    .field-group input {
        background-color: #111;
        border: 1px solid #333;
        border-radius: 10px;
        padding: 14px;
        color: white;
        font-size: 1rem;
        transition: 0.2s ease;
    }

    .field-group input:focus {
        outline: none;
        border-color: #ff2d2d;
        box-shadow: 0 0 10px rgba(255, 0, 0, 0.3);
    }

    .field-group input::placeholder {
        color: #888;
    }

    .error-box {
        color: #ff8a8a;
        text-align: center;
        margin-bottom: 12px;
        font-size: 0.95rem;
    }

    .btn-action {
        background: linear-gradient(135deg, #c40000, #7a0000);
        color: white;
        border: none;
        padding: 14px;
        border-radius: 10px;
        font-size: 1rem;
        font-weight: bold;
        cursor: pointer;
        transition: 0.2s ease;
    }

    .btn-action:hover {
        background: linear-gradient(135deg, #ff1a1a, #990000);
        box-shadow: 0 0 15px rgba(255, 0, 0, 0.4);
        transform: translateY(-2px);
    }

    .helper-text {
        text-align: center;
        color: #d1d5db;
        font-size: 0.95rem;
        margin-top: 14px;
    }

    .helper-text a {
        color: #ff6b6b;
        text-decoration: none;
    }

    .helper-text a:hover {
        text-decoration: underline;
    }
</style>
{% endblock body %}
