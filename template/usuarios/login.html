{% extends 'base.html' %}

{% block title %}Login{% endblock title %}

{% block body %}
<div class="form-page">
    <div class="form-card">
        <h1>Entrar</h1>
        {% if erro %}
            <div style="color: #b91c1c; text-align: center; margin-bottom: 14px;">{{ erro }}</div>
        {% endif %}
        <form method="POST">
            {% csrf_token %}
            <input type="email" name="email" placeholder="Email" required>
            <input type="password" name="senha" placeholder="Senha" required>
            <button type="submit">Entrar</button>
        </form>
    </div>
</div>
{% endblock body %}
